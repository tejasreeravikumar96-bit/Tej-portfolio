<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tejasree | Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0f172a;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 80px;
    background: #0b1224;
}

nav h2 {
    color: white;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 30px;
}

nav ul li {
    cursor: pointer;
    transition: 0.3s;
}

nav ul li:hover {
    color: #22d3ee;
}

/* HERO SECTION */
.hero {
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    background: radial-gradient(circle at center, #1e293b, #0f172a);
}

.hero img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid #22d3ee;
    margin-bottom: 20px;
}

.hero h1 {
    font-size: 55px;
    margin-bottom: 15px;
}

.hero span {
    background: linear-gradient(to right, #22d3ee, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    color: #94a3b8;
    margin-bottom: 30px;
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 20px;
}

.btn {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.primary {
    background: #22d3ee;
    color: black;
}

.secondary {
    background: transparent;
    border: 2px solid #22d3ee;
    color: white;
}

.btn:hover {
    transform: scale(1.05);
}

/* SECTION */
section {
    padding: 80px;
    text-align: center;
}

section h2 {
    margin-bottom: 30px;
    font-size: 32px;
}

footer {
    text-align: center;
    padding: 20px;
    background: #0b1224;
    color: #94a3b8;
}
</style>
</head>

<body>

<nav>
    <h2>TS.</h2>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Skills</li>
        <li>Projects</li>
        <li>Contact</li>
    </ul>
</nav>

<div class="hero">
    <img src="profile.jpg" alt="Profile">
    <h1>Hi, I'm <span>Tejasree</span></h1>
    <p>AI & Data Science Student focused on Machine Learning and Big Data.</p>

    <div class="buttons">
        <button class="btn primary">View Work</button>
        <button class="btn secondary">Contact Me</button>
    </div>
</div>

<section>
    <h2>About Me</h2>
    <p>I am a B.Tech AI & DS student passionate about teaching and building intelligent systems.</p>
</section>

<footer>
© 2026 Tejasree | Portfolio
</footer>

</body>
</html>
